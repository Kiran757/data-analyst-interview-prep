{c:"beh",d:"easy",q:'Tell me about a time your analysis was wrong.',a:`<p>Choose a professional example. Structure: what went wrong, how you discovered it, how you corrected it, what safeguard you put in place. End on the lesson. This question tests self-awareness and accountability.</p>`},
{c:"beh",d:"easy",q:'What would you do in your first 30 days in a data analyst role?',a:`<p>Listen first: understand the business model, key metrics, data stack, and team processes. Map available data. Identify a quick win for week 2. Build relationships with stakeholders to understand their real pain points.</p>`},
{c:"beh",d:"easy",q:'Why do you want to be a data analyst?',a:`<p>Be specific. Connect your skills (logic, communication, curiosity) to real impact. Avoid "I like numbers." Strong answer: <em>"I find it satisfying to translate messy data into a decision someone can actually act on."</em></p>`},
{c:"beh",d:"easy",q:'How do you prioritise when working on multiple requests?',a:`<p>Clarify urgency vs importance with requesters, communicate timelines proactively. Ask stakeholders: <em>"If I can only deliver one today, which moves the needle most?"</em> Break large tasks into quick wins.</p>`},
{c:"beh",d:"easy",q:'Describe a time you found a data quality issue.',a:`<p>Describe finding an anomaly, investigating root cause, communicating impact to stakeholders, and preventing recurrence. Key message: never silently work around quality issues — always surface, document, and quantify their impact.</p>`},
{c:"beh",d:"easy",q:'How do you ensure your analysis is reproducible?',a:`<p>Version SQL/Python in Git, document data sources and transformations, use notebooks with clear narrative, pin package versions in requirements.txt, and never manually edit source data. Another analyst should get the same result.</p>`},
{c:"beh",d:"easy",q:'Describe a time you automated a repetitive analytical task.',a:`<p>Example: weekly report manually built each Monday → automated with Python + scheduled job. Highlight time saved, error reduction, and freeing yourself for higher-value work. Automation skills are highly valued in modern data roles.</p>`},
{c:"beh",d:"easy",q:'How do you approach learning a new tool?',a:`<p>Hands-on over reading: build a small project that mirrors a real use case. Use official documentation, tutorials, and YouTube. Then apply to a portfolio project. Mention a specific tool you learned this way recently.</p>`},
{c:"beh",d:"easy",q:'How do you handle disagreements about data interpretation?',a:`<p>Start by understanding the other person's logic. Check definitions — disagreements are often caused by different metric definitions rather than different data. Present your evidence calmly and propose an empirical test to resolve it.</p>`},
{c:"beh",d:"easy",q:'Tell me about a project you are most proud of.',a:`<p>Choose a project with clear business impact. Structure: the problem, what you did, tools used, and quantified outcome. If it's in your GitHub portfolio, mention the link. Authenticity matters as much as technical detail.</p>`},
{c:"beh",d:"easy",q:'How do you maintain attention to detail?',a:`<p>Sanity checks (do totals add up?), row count checks before and after joins, visualising distributions before and after cleaning, testing edge cases, peer reviews. Describe specific checks you run routinely as part of your workflow.</p>`},
{c:"beh",d:"easy",q:'What are your go-to resources when you\'re stuck?',a:`<p>Official documentation first, then Stack Overflow, then community forums (dbt Slack, Reddit r/learnpython). For statistics: StatQuest YouTube, OpenIntro Statistics (free). For quick concepts: ChatGPT. Don't forget: asking a colleague is often fastest.</p>`},
{c:"beh",d:"easy",q:'How do you present to senior executives?',a:`<p>Lead with the recommendation and three supporting data points. One-page summaries, clear headlines not descriptions, state business implications upfront. Caveats and methodology go at the bottom. Executives want implications, not analysis methodology.</p>`},
{c:"beh",d:"easy",q:'What is your biggest weakness as a data analyst?',a:`<p>Choose a genuine, relevant weakness then show self-awareness and what you're doing about it. Example: <em>"I sometimes spend too long refining a visualisation. I've started timeboxing design work and asking for feedback earlier."</em></p>`},
{c:"beh",d:"easy",q:'Tell me about a time you influenced a business decision with data.',a:`<p>Show end-to-end ownership: you identified the question, gathered and cleaned the data, produced the analysis, communicated the insight, and the business took action because of it. Show the chain from data to decision to outcome.</p>`},
{c:"beh",d:"easy",q:'Do you have any questions for us?',a:`<p>Always prepare questions. Strong ones: <em>"What does success look like at 6 months?"</em>, <em>"What's the biggest data challenge the team faces right now?"</em>, <em>"How does the team approach professional development?"</em>, <em>"What does the data stack look like and where is it heading?"</em></p>`},
{c:"beh",d:"easy",q:'How do you think about ethics in data analytics?',a:`<p>Consider: is PII handled correctly? Could insights be used to discriminate? Are samples representative? Are models fair across demographic groups? Is analysis being used to support a pre-decided conclusion? Ethical analytics starts with asking these questions upfront.</p>`}
];

const PER=25;
let fQ=[],page=1,cat="all",sv="";

function filter(){
  const s=sv.toLowerCase();
  fQ=Q.filter(q=>(cat==="all"||q.c===cat)&&(!s||q.q.toLowerCase().includes(s)||q.a.toLowerCase().includes(s)));
}

function render(){
  const main=document.getElementById("main");
  main.querySelectorAll(".card,.sec-title").forEach(e=>e.remove());
  document.getElementById("no-r").style.display="none";
  if(!fQ.length){document.getElementById("no-r").style.display="block";document.getElementById("rbar").textContent="";document.getElementById("pg").innerHTML="";document.getElementById("vq").textContent="0";return;}
  const s=(page-1)*PER,e=Math.min(s+PER,fQ.length),pg=fQ.slice(s,e);
  document.getElementById("rbar").textContent=`showing ${s+1}–${e} of ${fQ.length} questions`;
  document.getElementById("vq").textContent=fQ.length;
  const groups={};
  pg.forEach((q,i)=>{if(!groups[q.c])groups[q.c]=[];groups[q.c].push({...q,idx:s+i+1});});
  ["sql","py","stat","xl","ml","dc","cl","viz","biz","tool","beh"].forEach(c=>{
    if(!groups[c])return;
    const t=document.createElement("div");t.className="sec-title";t.textContent=CL[c];main.appendChild(t);
    groups[c].forEach(q=>{
      const card=document.createElement("div");card.className="card";
      card.innerHTML=`<div class="ch"><span class="qn">#${String(q.idx).padStart(3,"0")}</span><div class="qb"><div class="qt"><span class="qtxt">${q.q}</span><span class="chev">&#8964;</span></div><div class="meta"><span class="tag t-${q.c}">${CL[q.c]}</span><span class="diff d-${q.d==="easy"?"easy":"med"}">${q.d==="easy"?"Beginner":"Intermediate"}</span></div></div></div><div class="ans"><div class="ans-inner"><div class="albl">Model Answer</div>${q.a}</div></div>`;
      card.querySelector(".ch").addEventListener("click",()=>{const o=card.classList.toggle("open");card.querySelector(".ans").setAttribute("aria-hidden",String(!o));});
      main.appendChild(card);
    });
  });
  renderPg();
  window.scrollTo({top:0,behavior:"smooth"});
}

function renderPg(){
  const tot=Math.ceil(fQ.length/PER),pg=document.getElementById("pg");
  pg.innerHTML="";if(tot<=1)return;
  const mk=(lbl,p,on)=>{const b=document.createElement("button");b.className="pb"+(on?" on":"");b.textContent=lbl;b.onclick=()=>{page=p;render();};return b;};
  if(page>1)pg.appendChild(mk("&#8592; Prev",page-1,false));
  for(let i=1;i<=tot;i++)pg.appendChild(mk(i,i,i===page));
  if(page<tot)pg.appendChild(mk("Next &#8594;",page+1,false));
}

document.querySelectorAll(".fp").forEach(b=>b.addEventListener("click",()=>{document.querySelectorAll(".fp").forEach(x=>x.classList.remove("on"));b.classList.add("on");cat=b.dataset.c;page=1;filter();render();}));
document.getElementById("srch").addEventListener("input",e=>{sv=e.target.value;page=1;filter();render();});
filter();render();
</script>
</body>
